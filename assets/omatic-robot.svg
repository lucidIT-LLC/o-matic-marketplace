<svg width="100%" height="100%" viewBox="0 0 1024 1536" version="1.1" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">O-Matic Robot Samples Vector Sheet</title>
  <desc id="desc">Editable vector recreation of the O-Matic robot sample sheet for Affinity, including one full-body mascot and three smaller expression/gesture heads.</desc>
  <defs>
    <style>
      .outline{stroke:#050606;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}
      .outline-lg{stroke:#050606;stroke-width:10;stroke-linecap:round;stroke-linejoin:round}
      .outline-sm{stroke:#050606;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}
      .teal{fill:url(#tealGloss)}
      .teal-flat{fill:#07848d}
      .teal-dark{fill:#064f55}
      .gold{fill:url(#goldGloss)}
      .gold-flat{fill:#ffc928}
      .cream{fill:#fff2cb}
      .black{fill:#050606}
      .joint{fill:#1f3030}
      .shadow{fill:#e8ddc7}
      .none{fill:none}
      .shine{fill:none;stroke:#fff5d5;stroke-width:7;stroke-linecap:round}
      .gold-line{fill:none;stroke:#ffc928;stroke-width:8;stroke-linecap:round}
    </style>
    <radialGradient id="tealGloss" cx="28%" cy="18%" r="88%">
